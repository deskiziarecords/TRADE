use nalgebra::{DMatrix, DVector, Scalar, RealField, Norm};
use std::f64;

/// ---------------------------------------------------------------------------
/// Venue description (unchanged)
/// ---------------------------------------------------------------------------
#[derive(Debug, Clone)]
struct Venue {
    gamma: f64, // liquidity coefficient γᵢ
    delta: f64, // convexity δᵢ ∈ [1,2]
}

/// Slippage at venue i for a notional q :  sᵢ(q) = γᵢ·q^{δᵢ}
fn slippage(venue: &Venue, q: f64) -> f64 {
    venue.gamma * q.powf(venue.delta)
}

/// Build instantaneous cost matrix C (same as before)
///   C_{ij} = s_i(Q·w_i) + s_j(Q·w_j) + ρ_{ij}·Q
///   ρ_{ij} = exp(−λ_dist·d_{ij})
fn build_cost_matrix(
    Q: f64,
    w: &DVector<f64>,
    venues: &[Venue],
    dist: &DMatrix<f64>,
    lambda_dist: f64,
) -> DMatrix<f64> {
    let m = venues.len();
    let mut C = DMatrix::zeros(m, m);

    // s_i = slippage_i(Q·w_i)
    let s: Vec<f64> = venues        .iter()
        .zip(w.iter())
        .map(|(v, wi)| slippage(v, Q * wi))
        .collect();

    for i in 0..m {
        for j in 0..m {
            let rho = (-lambda_dist * dist[(i, j)]).exp();
            C[(i, j)] = s[i] + s[j] + rho * Q;
        }
    }
    C
}

/// Symmetrise + tiny diagonal for numerical stability
///   C̃ = 2C + Cᵀ + εI   (ε = 1e‑6)
fn symmetrize(C: &DMatrix<f64>) -> DMatrix<f64> {
    let eps = 1e-6;
    let m = C.nrows();
    let mut Ct = C.transpose();
    let mut Ctilde = C * 2.0 + &Ct;
    for i in 0..m {
        Ctilde[(i, i)] += eps;
    }
    Ctilde
}

/// Projection onto the probability simplex Δ^{m‑1}
///   w = max(v − τ·1, 0)  with τ chosen so Σ w_i = 1fn simplex_projection(v: &DVector<f64>) -> DVector<f64> {
    let mut u = v.clone();
    u.as_mut_slice().sort_by(|a, b| b.partial_cmp(a).unwrap()); // descending

    let mut cssv = 0.0;
    let mut rho = 0usize;
    for (i, &val) in u.iter().enumerate() {
        cssv += val;
        let t = (cssv - 1.0) / (i as f64 + 1.0);
        if val > t {
            rho = i + 1;
        }
    }

    let tau = (u.iter().take(rho).sum::<f64>() - 1.0) / rho as f64;
    v.map(|x| if x - tau > 0.0 { x - tau } else { 0.0 })
}

/// ---------------------------------------------------------------------------
/// Adelic‑tube indicator
/// ---------------------------------------------------------------------------
/// Simple proxy (replace with genuine p‑adic norm if desired)
fn adelic_tube_indicator_simple(
    w: &DVector<f64>,
    lambdas: &DVector<f64>,
    rho_mat: &DMatrix<f64>,
) -> f64 {
    // Use the first few primes as a stand‑in for p‑adic places
    let primes = [2u64, 3, 5, 7, 11];
    let m = w.len();
    for i in 0..m {
        let prod: f64 = primes
            .iter()
            .map(|&p| (w[i] * lambdas[i]).abs().powf(1.0 / p as f64))
            .product();
        // Approximate |ρ|_p by the average off‑diagonal entry
        let rho_avg = (rho_mat.sum() - rho_mat.trace())
            / ((m * (m - 1)) as f64);
        if prod >= rho_avg {
            return 0.0; // violates tube constraint
        }
    }
    1.0
}

